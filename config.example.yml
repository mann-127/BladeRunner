# BladeRunner Configuration File
# Requires OPENROUTER_API_KEY or GROQ_API_KEY environment variable

# Backend selection (openrouter, groq, or google_adk)
# backend: openrouter  # Default: OpenRouter (all models, vision support)
# backend: groq        # Alternative: Groq (free tier, fastest, no vision)
# backend: google_adk  # Google ADK + Gemini (optional integration)
#
# AUTOMATIC FALLBACK: If your primary backend hits rate limits (429) or credit
# limits (402), BladeRunner automatically switches to an available fallback
# backend. Set up multiple API keys in .env to enable this feature.

# Default model (use alias or full name)
# OpenRouter: haiku, sonnet, opus (paid) | llama, gemini, mistral (free)
# Groq: groq-llama, groq-mixtral (free, fastest)
model: haiku

# Optional: override API base URL (auto-selected by backend)
base_url: https://openrouter.ai/api/v1

# Debug mode (shows backend switching and fallback info)
debug: false

# === Agentic AI Features ===
agent:
  # Tier 1: Strategic thinking and error recovery
  enable_planning: true       # Create multi-step plans before execution
  enable_reflection: true     # Analyze tool output and self-correct errors
  enable_retry: true          # Automatic retries with exponential backoff
  enable_streaming: false     # Stream tokens in real-time (CLI default: off)
  
  # Tier 2: Safety and learning
  require_approval: true       # Approve critical operations (rm, dd, etc.)
  enable_tool_tracking: true   # Track tool success rates over time
  enable_memory: true          # Store solutions for future similar tasks
  enable_agent_selection: true # Route tasks to specialized agents
  enable_evaluation: true      # Track performance metrics (success rate, token usage)
  enable_adaptation: true      # Inject strategy guidance after repeated tool failures
  adaptation_failure_threshold: 2  # Consecutive failures before adaptive guidance
  enable_trace: true           # Record structured execution trace for each run

# Interactive mode settings
interactive:
  streaming: true  # Streaming enabled by default in interactive mode (-i)

# Model configurations
models:
  # === OpenRouter Models (default backend) ===
  
  # Paid models (Claude - best for agents)
  haiku:
    full_name: anthropic/claude-haiku-4.5
    temperature: 0.7
    max_tokens: 2048
  
  sonnet:
    full_name: anthropic/claude-sonnet-4
    temperature: 0.7
    max_tokens: 2048
  
  opus:
    full_name: anthropic/claude-opus-4
    temperature: 0.8
    max_tokens: 2048
  
  # Free alternatives (good for testing)
  llama:
    full_name: meta-llama/llama-3.1-8b-instruct:free
    temperature: 0.7
    max_tokens: 2048
  
  gemini:
    full_name: google/gemini-flash-1.5:free
    temperature: 0.7
    max_tokens: 2048
  
  mistral:
    full_name: mistralai/mistral-7b-instruct:free
    temperature: 0.7
    max_tokens: 2048
  
  # === Groq Models (backend: groq) ===
  # Free tier: 14,400 requests/day, blazing fast
  
  groq-llama:
    full_name: llama-3.1-70b-versatile
    temperature: 0.7
    max_tokens: 2048
  
  groq-mixtral:
    full_name: mixtral-8x7b-32768
    temperature: 0.7
    max_tokens: 2048

# Backend configurations (auto-managed)
backends:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
  
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY

  google_adk:
    base_url: ""
    api_key_env: GOOGLE_API_KEY

# Permission settings
permissions:
  enabled: true
  profile: standard  # strict, standard, or permissive

# Session management
sessions:
  enabled: true
  directory: ~/.bladerunner/sessions

# Web search settings (DuckDuckGo by default - no API key needed)
web_search:
  enabled: true
  provider: duckduckgo  # or "brave" (requires BRAVE_API_KEY)
  max_results: 5
  timeout: 10

# Google ADK settings (optional)
google_adk:
  enabled: false
  model: gemini-2.0-flash
  enable_search_grounding: true

# FastAPI service settings
api:
  host: 127.0.0.1
  port: 8000
  database: ~/.bladerunner/api.db
  uploads_dir: ~/.bladerunner/uploads
  
  # Authentication settings
  auth:
    enabled: false
    keys: []  # Static API keys for basic auth (comma-separated in BLADERUNNER_API_KEYS env var)
    
    # JWT authentication (more secure for production)
    jwt:
      enabled: false
      secret_key: ""  # REQUIRED: Set via BLADERUNNER_JWT_SECRET env var, 32+ chars for HS256
      algorithm: HS256
      access_token_expire_minutes: 60
      refresh_token_expire_days: 7
    
    # User credentials for JWT login (use bladerunner-create-user to generate password hashes)
    users: []
      # Example user entry:
      # - username: admin
      #   password_hash: $2b$12$... (bcrypt hash)
      #   user_id: admin-001
      #   permissions: ["read", "write", "admin"]
  
  # Upload restrictions and retention
  uploads:
    max_size_mb: 10  # Maximum file size per upload
    allowed_types:  # MIME types allowed for uploads
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
    retention_days: 30  # Automatically delete uploads older than this
    per_user_quota_mb: 100  # Maximum total storage per user

# Logging settings (applies to API server and uvicorn)
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"
  date_format: "%Y-%m-%dT%H:%M:%S%z"
  uvicorn_access_log: true

# RAG (Retrieval-Augmented Generation) settings
# Requires: uv sync --extra rag
rag:
  enabled: false  # Enable RAG tools (rag_ingest, rag_search)
  persist_directory: ~/.bladerunner/rag_store
  embedding_model: all-MiniLM-L6-v2  # Lightweight embedding model
  default_collection: knowledge_base

# Skills system
skills:
  enabled: true
  directory: ~/.bladerunner/skills
  auto_match: false

# === Optional Dependencies ===
# Install these only if you need specific features:
#
# For RAG (Vector Storage & Semantic Search):
#   uv sync --extra rag
#
# For Google ADK (Gemini grounding bridge used by API engine):
#   uv sync --extra google
#
# For LSP Integration (Language Server Protocol):
#   uv sync --extra lsp
#   Status: ⚠️  Experimental/stub feature (not fully implemented)
#
# For MCP Servers (Model Context Protocol):
#   uv sync --extra mcp
#   Status: ⚠️  Experimental/stub feature (not fully implemented)
#
# For ACP Support (editor integration):
#   Uses stdlib JSON-RPC + streaming I/O (no extra package needed)
#   Status: ⚠️  Experimental/stub feature (not fully implemented)
#
# References:
# - RAG: Vector storage with ChromaDB and sentence-transformers
# - LSP: https://microsoft.github.io/language-server-protocol/
# - MCP: https://modelcontextprotocol.io/
# - ACP: https://docs.zed.dev/features/acp
#
# Note: Only RAG is production-ready. LSP/MCP/ACP are planned features.

# === Preset Profiles (Easter Eggs) ===
# Named after Officer K's designations in Blade Runner 2049
# Use with: bladerunner --profile officer-k -p "Your task"

profiles:
  officer-k:        # Cautious, by-the-book (maximum safety)
    permissions: strict
    agent:
      require_approval: true
      enable_planning: true
      enable_reflection: true
      
  constant-k:       # Balanced, adaptive (default settings)
    permissions: standard
    agent:
      require_approval: true
      enable_planning: true
      
  agent-k:          # Autonomous, decisive (minimal oversight)
    permissions: permissive
    agent:
      require_approval: false
      enable_retry: true
      enable_agent_selection: true
